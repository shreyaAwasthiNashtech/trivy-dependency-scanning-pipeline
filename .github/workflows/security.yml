name: DevSecOps Security Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t vulnerable-app .

    - name: Run Trivy Scan (Fail on Critical)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'vulnerable-app'
        format: 'json'
        output: 'trivy-report.json'
        severity: 'CRITICAL,HIGH'
        exit-code: '0'  # Changed to 0 to continue even with vulnerabilities (for demo)

    - name: Parse Report (Simulate Ticketing with SLA)
      run: python parse_report.py
      continue-on-error: true

    - name: Upload Scan Results
      uses: actions/upload-artifact@v3
      with:
        name: trivy-scan-results
        path: |
          trivy-report.json
          ticket-report.json
      if: always()