name: DevSecOps Security Pipeline

on:
  push:
    branches:
      - main

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Create Reports Directory
      run: mkdir -p shared/reports

    - name: Build Python App Docker Image
      run: docker build -t vulnerable-python-app ./python-app

    - name: Trivy Scan - Python Application
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: './python-app'
        scanners: 'vuln,secret,misconfig'
        format: 'json'
        output: 'shared/reports/python-report.json'
        severity: 'CRITICAL,HIGH'
        exit-code: '0'

    - name: Build Node.js App Docker Image
      run: docker build -t vulnerable-node-app ./nodejs-app

    - name: Trivy Scan - Node.js Application
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: './nodejs-app'
        scanners: 'vuln,secret,misconfig'
        format: 'json'
        output: 'shared/reports/nodejs-report.json'
        severity: 'CRITICAL,HIGH'
        exit-code: '0'

    - name: Build Java App Docker Image
      run: docker build -t vulnerable-java-app ./java-app

    - name: Trivy Scan - Java Application
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: './java-app'
        scanners: 'vuln,secret,misconfig'
        format: 'json'
        output: 'shared/reports/java-report.json'
        severity: 'CRITICAL,HIGH'
        exit-code: '0'

    # PHASE 10: Generate SARIF Reports for GitHub Security Integration
    - name: Generate SARIF Report - Python
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: './python-app'
        format: 'sarif'
        output: 'shared/reports/python-results.sarif'

    - name: Generate SARIF Report - Node.js
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: './nodejs-app'
        format: 'sarif'
        output: 'shared/reports/nodejs-results.sarif'

    - name: Generate SARIF Report - Java
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: './java-app'
        format: 'sarif'
        output: 'shared/reports/java-results.sarif'

    - name: Install Python Dependencies
      run: pip install -r shared/scripts/requirements.txt

    - name: Parse Reports and Generate SLA Tickets
      run: python shared/scripts/parse_report.py
      continue-on-error: true

    - name: Upload Scan Results
      uses: actions/upload-artifact@v4
      with:
        name: trivy-scan-results
        path: shared/reports/

      if: always()